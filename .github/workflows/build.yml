name: Build

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary_path: build/rpg_cpp_remake
            package_ext: tar.gz
          - os: macos-latest
            platform: macos
            binary_path: build/rpg_cpp_remake.app
            package_ext: zip
          - os: windows-latest
            platform: windows
            binary_path: build/Release/rpg_cpp_remake.exe
            package_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake jq git build-essential pkg-config libasound2-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev

      - name: Build static raylib (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git /tmp/raylib
          cmake -S /tmp/raylib -B /tmp/raylib/build \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/raylib-static"
          cmake --build /tmp/raylib/build --parallel
          cmake --install /tmp/raylib/build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake jq raylib

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y cmake jq
          git clone https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE/vcpkg"
          & "$env:GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.bat"
          & "$env:GITHUB_WORKSPACE/vcpkg/vcpkg.exe" install raylib:x64-windows

      - name: Read version metadata
        shell: bash
        run: |
          echo "VERSION=$(jq -r '.version' version.json)" >> "$GITHUB_ENV"

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/raylib-static"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Create release notes snippet
        shell: bash
        run: |
          cat > release-notes-${{ matrix.platform }}.txt <<'EOF'
          Unsigned binary package for RPG CPP Remake.
          macOS: open the .app bundle from Finder.
          Windows: run rpg_cpp_remake.exe.
          Linux: run ./rpg_cpp_remake after chmod +x if needed.
          EOF

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          PACKAGE_ROOT="RPG-CPP-Remake-v${VERSION}-linux"
          mkdir -p "dist/${PACKAGE_ROOT}"
          cp "${{ matrix.binary_path }}" "dist/${PACKAGE_ROOT}/rpg_cpp_remake"
          cp "release-notes-${{ matrix.platform }}.txt" "dist/${PACKAGE_ROOT}/README.txt"
          tar -C dist -czf "dist/${PACKAGE_ROOT}.tar.gz" "${PACKAGE_ROOT}"
          echo "PACKAGE_FILE=dist/${PACKAGE_ROOT}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          PACKAGE_ROOT="RPG-CPP-Remake-v${VERSION}-macos"
          mkdir -p "dist/${PACKAGE_ROOT}"
          cp -R "${{ matrix.binary_path }}" "dist/${PACKAGE_ROOT}/rpg_cpp_remake.app"
          cp "release-notes-${{ matrix.platform }}.txt" "dist/${PACKAGE_ROOT}/README.txt"
          ditto -c -k --sequesterRsrc --keepParent "dist/${PACKAGE_ROOT}" "dist/${PACKAGE_ROOT}.zip"
          echo "PACKAGE_FILE=dist/${PACKAGE_ROOT}.zip" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageRoot = "RPG-CPP-Remake-v$env:VERSION-windows"
          New-Item -ItemType Directory -Path "dist/$packageRoot" -Force | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist/$packageRoot/rpg_cpp_remake.exe"
          Copy-Item "release-notes-${{ matrix.platform }}.txt" "dist/$packageRoot/README.txt"
          Compress-Archive -Path "dist/$packageRoot" -DestinationPath "dist/$packageRoot.zip" -Force
          "PACKAGE_FILE=dist/$packageRoot.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPG-CPP-Remake-v${{ env.VERSION }}-${{ matrix.platform }}
          path: ${{ env.PACKAGE_FILE }}

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: RPG-CPP-Remake-v*
          merge-multiple: true

      - name: Create GitHub release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
